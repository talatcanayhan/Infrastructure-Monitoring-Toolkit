# =============================================================================
# InfraProbe CI Pipeline
# =============================================================================
# Runs on every push / PR to main and develop.
# Job graph:
#   lint -> test + security -> build-docker -> integration-test
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write          # for CodeQL / sarif uploads

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:

  # ---- 1. Lint -----------------------------------------------------------
  lint:
    name: Lint (black / flake8 / mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Black — check formatting
        run: black --check --diff src/ tests/

      - name: Flake8 — lint
        run: flake8 src/ tests/

      - name: Mypy — static type checking
        run: mypy src/

  # ---- 2. Test (matrix) --------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=infraprobe \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -m "not integration and not requires_root"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ---- 3. Security -------------------------------------------------------
  security:
    name: Security scans
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0        # gitleaks needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

      - name: Gitleaks — secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bandit — Python security linter
        run: bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ---- 4. Build Docker image ---------------------------------------------
  build-docker:
    name: Build Docker image
    needs: [test, security]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (with BuildKit cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: infraprobe:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy — image vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: infraprobe:ci-${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

  # ---- 5. Integration test -----------------------------------------------
  integration-test:
    name: Integration test (docker compose)
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build and start stack
        run: docker compose up -d --build --wait
        env:
          DOCKER_BUILDKIT: 1

      - name: Wait for services to become healthy
        run: |
          echo "Waiting for infraprobe to be healthy..."
          for i in $(seq 1 30); do
            if docker inspect --format='{{.State.Health.Status}}' infraprobe 2>/dev/null | grep -q healthy; then
              echo "infraprobe is healthy"
              break
            fi
            echo "  attempt $i/30 — waiting 5s..."
            sleep 5
          done

      - name: Verify /metrics endpoint
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9100/metrics)
          echo "GET /metrics -> HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "FAIL: expected 200"; exit 1; }

      - name: Verify Prometheus is scraping
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9090/-/healthy)
          echo "GET /prometheus/-/healthy -> HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || { echo "FAIL: expected 200"; exit 1; }

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v
