# =============================================================================
# InfraProbe - Ansible Inventory
# =============================================================================
# Defines the target hosts for InfraProbe deployment.
#
# For production, replace localhost with actual server IPs or hostnames.
# You can also generate this dynamically from Terraform outputs:
#   terraform output -json | python3 scripts/generate_inventory.py
# =============================================================================

all:
  children:
    monitoring_servers:
      hosts:
        infraprobe-01:
          ansible_host: localhost
          ansible_connection: local
          # For remote hosts, uncomment and configure:
          # ansible_host: 10.0.1.100
          # ansible_connection: ssh
          # ansible_ssh_private_key_file: ~/.ssh/infraprobe-dev.pem

      # Example of adding a second host for production HA:
      # infraprobe-02:
      #   ansible_host: 10.0.2.100
      #   ansible_connection: ssh
      #   ansible_ssh_private_key_file: ~/.ssh/infraprobe-prod.pem
