# =============================================================================
# InfraProbe — NetworkPolicy
# =============================================================================
# Restricts ingress traffic to the InfraProbe pods:
#   - Only pods with label "app: prometheus" may connect on port 9100
#   - All other ingress is denied by default
# Egress is left unrestricted so InfraProbe can reach monitoring targets.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: infraprobe-allow-prometheus
  namespace: infraprobe
  labels:
    app: infraprobe
    app.kubernetes.io/name: infraprobe
    app.kubernetes.io/component: network
spec:
  podSelector:
    matchLabels:
      app: infraprobe
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9100
