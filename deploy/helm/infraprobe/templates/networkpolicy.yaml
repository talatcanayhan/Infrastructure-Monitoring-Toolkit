{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "infraprobe.fullname" . }}-allow-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "infraprobe.labels" . | nindent 4 }}
    app.kubernetes.io/component: network
spec:
  podSelector:
    matchLabels:
      {{- include "infraprobe.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            {{- toYaml .Values.networkPolicy.ingressFrom.podSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
{{- end }}
