apiVersion: v1
kind: Service
metadata:
  name: {{ include "infraprobe.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "infraprobe.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "infraprobe.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
