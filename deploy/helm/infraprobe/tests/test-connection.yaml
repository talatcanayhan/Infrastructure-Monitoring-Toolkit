apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "infraprobe.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "infraprobe.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl-test
      image: curlimages/curl:8.5.0
      command:
        - sh
        - -c
        - |
          echo "Testing InfraProbe metrics endpoint..."
          RESPONSE=$(curl -sf --max-time 10 \
            http://{{ include "infraprobe.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}/metrics)
          if echo "$RESPONSE" | grep -q "infraprobe_"; then
            echo "SUCCESS: Metrics endpoint is responding with InfraProbe metrics."
            exit 0
          else
            echo "FAILURE: Metrics endpoint did not return expected InfraProbe metrics."
            exit 1
          fi
